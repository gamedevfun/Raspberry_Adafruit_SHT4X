name: CMake CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset native-debug

      - name: Build
        run: cmake --build --preset native-debug

      - name: Test
        run: ctest --test-dir build --output-on-failure
